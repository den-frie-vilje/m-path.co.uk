# Sveltia CMS config for m-path.co.uk — fully expanded (no anchors/merges) so any YAML parser reads
# it. Mirrors src/content/*.json (typed in src/lib/content/index.ts). Prose = limited markdown toolbar;
# lists render gracefully at any length. All SEO content is CMS-sourced (titles/descriptions/OG/schema).
backend:
  name: github
  repo: den-frie-vilje/m-path.co.uk
  branch: staging
  base_url: https://m-path-co-uk.staging.denfrievilje.dk/auth
  site_domain: m-path-co-uk.staging.denfrievilje.dk
publish_mode: simple
media_folder: static/img
public_folder: /img
collections:
- name: general
  label: General
  editor:
    preview: false
  files:
  - name: site
    label: Site
    file: src/content/site.json
    fields:
    - name: brand
      label: Brand name
      widget: string
    - name: tagline
      label: Tagline
      widget: string
    - name: url
      label: Site URL
      widget: string
    - name: logo
      label: Logo
      widget: image
    - name: logoWhite
      label: Logo (white)
      widget: image
    - widget: markdown
      buttons:
      - bold
      - italic
      - link
      - heading-two
      - heading-three
      - quote
      - bulleted-list
      - numbered-list
      editor_components: []
      modes:
      - rich_text
      - raw
      minimal: false
      name: footerBlurb
      label: Footer blurb
    - name: nav
      label: Header navigation
      widget: list
      summary: '{{fields.label}}'
      fields:
      - name: label
        widget: string
      - name: href
        widget: string
    - name: footerNav
      label: Footer navigation
      widget: list
      summary: '{{fields.label}}'
      fields:
      - name: label
        widget: string
      - name: href
        widget: string
    - name: cta
      label: Header CTA
      widget: object
      fields:
      - name: label
        widget: string
      - name: href
        widget: string
    - name: contacts
      label: Contact routes
      widget: list
      summary: '{{fields.label}}'
      fields:
      - name: label
        label: Label
        widget: string
      - name: phone
        label: Phone
        widget: string
        required: false
      - name: phoneHref
        label: Phone link (tel:)
        widget: string
        required: false
      - name: email
        label: Email
        widget: string
    - name: socials
      label: Social links
      widget: list
      required: false
      summary: '{{fields.label}}'
      fields:
      - name: label
        label: Label
        widget: string
      - name: icon
        label: Icon
        widget: select
        options:
        - facebook
        - twitter
        - linkedin
      - name: href
        label: URL
        widget: string
    - name: defaultSeo
      label: Default SEO / share card
      widget: object
      fields:
      - name: title
        label: Title
        widget: string
        required: false
      - name: description
        label: Meta description
        widget: text
      - name: image
        label: OG image
        widget: image
        required: false
  - name: testimonials
    label: Testimonials
    file: src/content/testimonials.json
    description: Sitewide quotes. `tag` controls where they appear (workplace-only vs everywhere).
    fields:
    - name: items
      label: Testimonials
      widget: list
      summary: '{{fields.org}} — {{fields.quote}}'
      fields:
      - widget: markdown
        buttons:
        - bold
        - italic
        - link
        - heading-two
        - heading-three
        - quote
        - bulleted-list
        - numbered-list
        editor_components: []
        modes:
        - rich_text
        - raw
        minimal: false
        name: quote
        label: Quote
      - name: author
        label: Author
        widget: string
        required: false
      - name: org
        label: Organisation
        widget: string
        required: false
      - name: href
        label: Link
        widget: string
        required: false
      - name: tag
        label: Audience
        widget: select
        options:
        - general
        - workplace
        default: general
        hint: '''workplace'' shows only on Workplaces; ''general'' shows everywhere (incl. Schools).'
  - name: partners
    label: Partner logos
    file: src/content/partners.json
    fields:
    - name: items
      label: Partners
      widget: list
      summary: '{{fields.name}}'
      fields:
      - name: name
        label: Name
        widget: string
      - name: logo
        label: Logo
        widget: image
      - name: href
        label: Link
        widget: string
        required: false
      - name: kind
        label: Kind
        widget: select
        options:
        - organisation
        - school
        - press
        default: organisation
