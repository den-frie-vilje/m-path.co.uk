# Trigger: push to the `staging` branch (Sveltia auto-commits here on every editor save) or manual
# workflow_dispatch.
#
# Build + push + Sigstore Cosign sign happens in the reusable workflow in den-frie-vilje/nas-sites.
# CI does NOT call the NAS — the NAS-side pull-only agent verifies the signature and deploys on its
# own schedule (within ~5 min of the push). The editor is NOT stripped on staging (STRIP_EDITOR
# defaults false), so /admin + the GitHub OAuth proxy work here.

name: Deploy to staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      multiarch:
        description: 'Also build linux/arm64 (slow — adds ~3min QEMU emulation). Default amd64-only matches the NAS.'
        type: boolean
        default: false

jobs:
  deploy:
    uses: den-frie-vilje/nas-sites/.github/workflows/build-and-sign.yml@main
    with:
      environment: staging
      dockerfile: deploy/Dockerfile
      image-name: ghcr.io/den-frie-vilje/m-path
      platforms: ${{ inputs.multiarch && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      build-args: |
        VITE_MODE=staging
        PUBLIC_GIT_SHA=${{ github.sha }}
        PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
        PUBLIC_GITHUB_REPO=${{ github.repository }}
      # Origin URL (not the CF apex) so the verify poll bypasses any CDN caching.
      verify-url: https://m-path-co-uk.stage.denfrievilje.dk/
